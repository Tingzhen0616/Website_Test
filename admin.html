<body class="bg-gray-100 min-h-screen">
    <!-- 登录界面 -->
    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">管理员登录</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码">
                </div>
                <button onclick="login()" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition">登录</button>
            </div>

        </div>
    </div>

    <!-- 管理界面 -->
    <div id="adminSection" class="hidden">
        <!-- 导航栏 -->
        <nav class="bg-white shadow-md">
            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">作品管理</h1>
                <div class="space-x-4">
                    <a href="index.html" class="text-blue-500 hover:text-blue-600">查看前台</a>
                    <button onclick="logout()" class="text-red-500 hover:text-red-600">退出登录</button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 py-8">
            <!-- 添加作品表单 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4">添加新作品</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作品名称</label>
                        <input type="text" id="productName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入作品名称">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作品详情</label>
                        <div id="detailEditor" class="bg-white border rounded-md"></div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作品图片（可选）</label>
                        <input type="file" id="productImage" accept="image/*" class="w-full" onchange="previewImage(event)">
                        <div id="imagePreview" class="mt-2 hidden">
                            <img id="preview" class="max-w-xs h-32 object-cover rounded">
                        </div>
                    </div>
                    <button onclick="addProduct()" class="bg-green-500 text-white px-6 py-2 rounded-md hover:bg-green-600 transition">添加作品</button>
                </div>
            </div>

            <!-- 作品列表 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">作品列表</h2>
                    <button id="saveOrderBtn" onclick="saveSortOrder()" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600 transition hidden">保存排序</button>
                </div>
                <div id="sortableProductList" class="space-y-4">
                    <!-- 作品列表将在这里显示 -->
                </div>
                <div id="adminEmptyState" class="text-center py-8 text-gray-500 hidden">
                    暂无作品
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑作品模态框 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">编辑作品</h2>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <input type="hidden" id="editProductId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作品名称</label>
                        <input type="text" id="editProductName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作品详情</label>
                        <div id="editDetailEditor" class="bg-white border rounded-md"></div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作品图片（留空则不修改）</label>
                        <input type="file" id="editProductImage" accept="image/*" class="w-full" onchange="previewEditImage(event)">
                        <div id="editImagePreview" class="mt-2 hidden">
                            <img id="editPreview" class="max-w-xs h-32 object-cover rounded">
                        </div>
                    </div>
                    <button onclick="saveEditProduct()" class="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图片裁剪模态框 -->
    <div id="cropModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
                <h2 id="cropModalTitle" class="text-2xl font-bold text-gray-800">裁剪图片</h2>
                <button onclick="cancelCrop()" class="text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6">
                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="flex-1">
                        <p class="text-sm text-gray-600 mb-2">拖拽调整裁剪区域，滚轮缩放</p>
                        <div class="max-h-96 overflow-hidden bg-gray-100 rounded-lg">
                            <img id="cropImage" class="max-w-full">
                        </div>
                    </div>
                    <div class="lg:w-64">
                        <p class="text-sm text-gray-600 mb-2">预览效果</p>
                        <div id="cropPreview" class="w-full h-48 bg-gray-100 rounded-lg overflow-hidden"></div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-4">
                    <button onclick="cancelCrop()" class="px-6 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition">取消</button>
                    <button onclick="confirmCrop()" class="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition">确认裁剪</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://tdtrpsmqzegmrywbcorh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdHJwc21xemVnbXJ5d2Jjb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgzNTIsImV4cCI6MjA5MjI2NDM1Mn0._Yr7Uw6vhRgj7hI5deUJ5WLmcd_odgEm-Q1aiwWCk3g';
        
        // 初始化 Supabase 客户端
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 默认密码
        const ADMIN_PASSWORD = 'admin123';
        let currentFile = null;
        let quillEditor = null;
        let editQuillEditor = null;
        let editCurrentFile = null;
        let cropper = null;
        let currentCropCallback = null;
        let currentCropFile = null;
        let productsCache = [];

        // 检查登录状态
        function checkLogin() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                showAdminSection();
            }
        }

        // 登录
        function login() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                showAdminSection();
            } else {
                alert('密码错误！');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // 显示管理界面
        function showAdminSection() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            
            if (!quillEditor) {
                var fonts = ['sans-serif', 'serif', 'monospace', 'Microsoft YaHei', 'SimSun', 'KaiTi', 'FangSong', 'Heiti SC', 'STXingkai', 'STLiti', 'YouYuan', 'Arial', 'Georgia', 'Times New Roman', 'Courier New', 'Verdana'];
                var Font = Quill.import('formats/font');
                Font.whitelist = fonts;
                Quill.register(Font, true);
                
                var sizes = ['10px', '12px', '14px', '16px', '18px', '20px', '24px', '28px', '32px', '36px', '48px', '60px', '72px'];
                var Size = Quill.import('formats/size');
                Size.whitelist = sizes;
                Quill.register(Size, true);
                
                quillEditor = new Quill('#detailEditor', {
                    theme: 'snow',
                    placeholder: '输入作品详情...',
                    modules: {
                        toolbar: {
                            container: [
                                [{ 'font': fonts }],
                                [{ 'size': ['10px', '12px', '14px', '16px', '18px', '20px', '24px', '28px', '32px', '36px', '48px', '60px', '72px'] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'script': 'super' }, { 'script': 'sub' }],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                [{ 'align': [] }],
                                ['link', 'image'],
                                ['clean']
                            ],
                            handlers: {
                                image: function() {
                                    const input = document.createElement('input');
                                    input.setAttribute('type', 'file');

        // 上传图片到 Supabase Storage
        async function uploadImage(file) {
            console.log('开始上传图片:', file.name, '大小:', file.size, '类型:', file.type);
            
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            
            try {
                const { data, error } = await supabaseClient.storage
                    .from('product-images')
                    .upload(fileName, file);
                
                console.log('Storage 上传响应:', { data, error });
                
                if (error) {
                    console.error('上传图片失败:', error);
                    alert('图片上传失败: ' + error.message + '\n\n请检查：\n1. Supabase Storage 中是否存在 "product-images" bucket\n2. Storage 的 RLS 策略是否允许上传');
                    return null;
                }
                
                // 获取图片的公开 URL
                const { data: urlData, error: urlError } = supabaseClient.storage
                    .from('product-images')
                    .getPublicUrl(fileName);
                
                if (urlError) {
                    console.error('获取公开 URL 失败:', urlError);
                    return null;
                }
                
                const publicUrl = urlData.publicUrl;
                console.log('图片上传成功，公开 URL:', publicUrl);
                
                return publicUrl;
            } catch (err) {
                console.error('上传图片异常:', err);
                alert('上传图片异常: ' + err.message);
                return null;
            }
        }

        // 图片大小调整和对齐功能
        function initImageResize(editor, selector) {
            const editorContainer = document.querySelector(selector);
            if (!editorContainer) return;
            
            let selectedImg = null;
            let resizer = null;
            let alignToolbar = null;
            
            editorContainer.addEventListener('click', function(e) {
                if (e.target.tagName === 'IMG') {
                    selectedImg = e.target;
                    removeResizer();
                    removeAlignToolbar();
                    createResizer(selectedImg);
                    createAlignToolbar(selectedImg);
                } else if (!e.target.closest('.image-align-toolbar') && !e.target.closest('.resize-handle')) {
                    removeResizer();
                    removeAlignToolbar();
                }
            });
            
            function createAlignToolbar(img) {
                alignToolbar = document.createElement('div');
                alignToolbar.className = 'image-align-toolbar';
                
                const alignLeft = document.createElement('button');
                alignLeft.textContent = '◀';
                alignLeft.title = '左对齐';
                alignLeft.onclick = () => setImageAlignment(img, 'left');
                
                const alignCenter = document.createElement('button');
                alignCenter.textContent = '■';
                alignCenter.title = '居中';
                alignCenter.onclick = () => setImageAlignment(img, 'center');
                
                const alignRight = document.createElement('button');
                alignRight.textContent = '▶';
                alignRight.title = '右对齐';
                alignRight.onclick = () => setImageAlignment(img, 'right');
                
                alignToolbar.appendChild(alignLeft);
                alignToolbar.appendChild(alignCenter);
                alignToolbar.appendChild(alignRight);
                
                document.body.appendChild(alignToolbar);
                positionAlignToolbar(img);
                
                const currentAlign = getCurrentAlignment(img);
                if (currentAlign === 'left') alignLeft.classList.add('active');
                else if (currentAlign === 'center') alignCenter.classList.add('active');
                else if (currentAlign === 'right') alignRight.classList.add('active');
            }
            
            function getCurrentAlignment(img) {
                if (img.classList.contains('img-align-left')) return 'left';
                if (img.classList.contains('img-align-center')) return 'center';
                if (img.classList.contains('img-align-right')) return 'right';
                return 'none';
            }
            
            function setImageAlignment(img, align) {
                img.classList.remove('img-align-left', 'img-align-center', 'img-align-right');
                
                if (align === 'left') img.classList.add('img-align-left');
                else if (align === 'center') img.classList.add('img-align-center');
                else if (align === 'right') img.classList.add('img-align-right');
                
                const buttons = alignToolbar.querySelectorAll('button');
                buttons.forEach(btn => btn.classList.remove('active'));
                
                const btnMap = { left: 0, center: 1, right: 2 };
                buttons[btnMap[align]]?.classList.add('active');
                
                if (resizer) {
                    updateResizerPosition(img);
                }
                positionAlignToolbar(img);
            }
            
            function positionAlignToolbar(img) {
                const rect = img.getBoundingClientRect();
                const toolbarWidth = 96;
                let left = rect.left + (rect.width / 2) - (toolbarWidth / 2);
                let top = rect.top - 45;
                
                if (left < 10) left = 10;
                if (top < 10) top = rect.bottom + 10;
                
                alignToolbar.style.left = left + 'px';
                alignToolbar.style.top = top + 'px';
            }
            
            function removeAlignToolbar() {
                if (alignToolbar) {
                    alignToolbar.remove();
                    alignToolbar = null;
                }
            }
            
            function createResizer(img) {
                resizer = document.createElement('div');
                resizer.className = 'img-resizer';
                resizer.style.position = 'absolute';
                resizer.style.zIndex = '10';
                
                updateResizerPosition(img);
                
                const handle = document.createElement('div');
                handle.className = 'resize-handle se';
                resizer.appendChild(handle);
                
                editorContainer.appendChild(resizer);
                
                let isResizing = false;
                let startX, startY, startWidth, startHeight;
                
                handle.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    isResizing = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startWidth = img.width;
                    startHeight = img.height;
                    
                    document.addEventListener('mousemove', resize);
                    document.addEventListener('mouseup', stopResize);
                });
                
                function resize(e) {
                    if (!isResizing) return;
                    
                    const aspectRatio = startWidth / startHeight;
                    const deltaX = e.clientX - startX;
                    const deltaY = e.clientY - startY;
                    
                    let newWidth = startWidth + deltaX;
                    let newHeight = startHeight + deltaY;
                    
                    if (Math.abs(deltaX) > Math.abs(deltaY)) {
                        newHeight = newWidth / aspectRatio;
                    } else {
                        newWidth = newHeight * aspectRatio;
                    }
                    
                    if (newWidth > 50 && newHeight > 50) {
                        img.style.width = newWidth + 'px';
                        img.style.height = newHeight + 'px';
                        updateResizerPosition(img);
                        if (alignToolbar) {
                            positionAlignToolbar(img);
                        }
                    }
                }
                
                function stopResize() {
                    isResizing = false;
                    document.removeEventListener('mousemove', resize);
                    document.removeEventListener('mouseup', stopResize);
                }
            }
            
            function updateResizerPosition(img) {
                const rect = img.getBoundingClientRect();
                const editorRect = editorContainer.getBoundingClientRect();
                
                resizer.style.left = (rect.left - editorRect.left + editorContainer.scrollLeft) + 'px';
                resizer.style.top = (rect.top - editorRect.top + editorContainer.scrollTop) + 'px';
                resizer.style.width = img.offsetWidth + 'px';
                resizer.style.height = img.offsetHeight + 'px';
            }
            
            function removeResizer() {
                if (resizer) {
                    resizer.remove();
                    resizer = null;
                }
            }
        }

        // 页面加载时检查登录状态
        checkLogin();
    </script>
</body>
</html>
