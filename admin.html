<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 登录界面 -->
    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">管理员登录</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码">
                </div>
                <button onclick="login()" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition">登录</button>
            </div>

        </div>
    </div>

    <!-- 管理界面 -->
    <div id="adminSection" class="hidden">
        <!-- 导航栏 -->
        <nav class="bg-white shadow-md">
            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">产品管理</h1>
                <div class="space-x-4">
                    <a href="index.html" class="text-blue-500 hover:text-blue-600">查看前台</a>
                    <button onclick="logout()" class="text-red-500 hover:text-red-600">退出登录</button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 py-8">
            <!-- 添加产品表单 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4">添加新产品</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品名称</label>
                        <input type="text" id="productName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入产品名称">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品描述</label>
                        <textarea id="productDesc" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入产品描述"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品详情</label>
                        <div id="detailEditor" class="bg-white border rounded-md"></div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品图片</label>
                        <input type="file" id="productImage" accept="image/*" class="w-full" onchange="previewImage(event)">
                        <div id="imagePreview" class="mt-2 hidden">
                            <img id="preview" class="max-w-xs h-32 object-cover rounded">
                        </div>
                    </div>
                    <button onclick="addProduct()" class="bg-green-500 text-white px-6 py-2 rounded-md hover:bg-green-600 transition">添加产品</button>
                </div>
            </div>

            <!-- 产品列表 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">产品列表</h2>
                <div id="adminProductList" class="space-y-4">
                    <!-- 产品列表将在这里显示 -->
                </div>
                <div id="adminEmptyState" class="text-center py-8 text-gray-500 hidden">
                    暂无产品
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑产品模态框 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">编辑产品</h2>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <input type="hidden" id="editProductId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品名称</label>
                        <input type="text" id="editProductName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品描述</label>
                        <textarea id="editProductDesc" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品详情</label>
                        <div id="editDetailEditor" class="bg-white border rounded-md"></div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品图片（留空则不修改）</label>
                        <input type="file" id="editProductImage" accept="image/*" class="w-full" onchange="previewEditImage(event)">
                        <div id="editImagePreview" class="mt-2 hidden">
                            <img id="editPreview" class="max-w-xs h-32 object-cover rounded">
                        </div>
                    </div>
                    <button onclick="saveEditProduct()" class="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://tdtrpsmqzegmrywbcorh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdHJwc21xemVnbXJ5d2Jjb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgzNTIsImV4cCI6MjA5MjI2NDM1Mn0._Yr7Uw6vhRgj7hI5deUJ5WLmcd_odgEm-Q1aiwWCk3g';
        
        // 初始化 Supabase 客户端
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 默认密码
        const ADMIN_PASSWORD = 'admin123';
        let currentFile = null;
        let quillEditor = null;
        let editQuillEditor = null;
        let editCurrentFile = null;

        // 检查登录状态
        function checkLogin() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                showAdminSection();
            }
        }

        // 登录
        function login() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                showAdminSection();
            } else {
                alert('密码错误！');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // 显示管理界面
        function showAdminSection() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            
            if (!quillEditor) {
                quillEditor = new Quill('#detailEditor', {
                    theme: 'snow',
                    placeholder: '输入产品详情...',
                    modules: {
                        toolbar: [
                            [{ 'header': [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ 'color': [] }, { 'background': [] }],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'align': [] }],
                            ['link', 'image'],
                            ['clean']
                        ]
                    }
                });
            }
            
            loadAdminProducts();
        }

        // 图片预览
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                currentFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // 上传图片到 Supabase Storage
        async function uploadImage(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            
            const { data, error } = await supabaseClient.storage
                .from('product-images')
                .upload(fileName, file);
            
            if (error) {
                console.error('上传图片失败:', error);
                return null;
            }
            
            // 获取图片的公开 URL
            const { data: { publicUrl } } = supabaseClient.storage
                .from('product-images')
                .getPublicUrl(fileName);
            
            return publicUrl;
        }

        // 添加产品
        async function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const description = document.getElementById('productDesc').value.trim();
            const detail = quillEditor.root.innerHTML;
            
            if (!name || !description || !currentFile) {
                alert('请填写完整信息并上传图片！');
                return;
            }

            try {
                // 上传图片
                const imageUrl = await uploadImage(currentFile);
                if (!imageUrl) {
                    alert('图片上传失败，请重试');
                    return;
                }

                // 保存产品信息到数据库
                const { error } = await supabaseClient
                    .from('products')
                    .insert([
                        { 
                            id: Date.now(), 
                            name: name, 
                            description: description, 
                            image_url: imageUrl,
                            detail: detail,
                            created_at: new Date().toISOString()
                        }
                    ]);
                
                console.log('Insert result:', { error });

                if (error) {
                    console.error('保存产品失败:', error);
                    alert('保存产品失败，请重试');
                    return;
                }

                // 清空表单
                document.getElementById('productName').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productImage').value = '';
                document.getElementById('imagePreview').classList.add('hidden');
                quillEditor.setContents([]);
                currentFile = null;

                loadAdminProducts();
                alert('产品添加成功！');
            } catch (err) {
                console.error('添加产品出错:', err);
                alert('添加产品出错，请重试');
            }
        }

        // 加载产品列表（管理界面）
        async function loadAdminProducts() {
            const productList = document.getElementById('adminProductList');
            const emptyState = document.getElementById('adminEmptyState');
            
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('加载产品失败:', error);
                    return;
                }
                
                if (!products || products.length === 0) {
                    productList.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                productList.innerHTML = products.map(product => `
                    <div class="flex items-center space-x-4 p-4 border rounded-lg">
                        <img src="${product.image_url}" alt="${product.name}" class="w-24 h-24 object-cover rounded">
                        <div class="flex-1">
                            <h3 class="font-semibold text-lg">${product.name}</h3>
                            <p class="text-gray-600 text-sm">${product.description}</p>
                            <p class="text-gray-400 text-xs mt-1">添加时间: ${new Date(product.created_at).toLocaleString()}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick='editProduct(${JSON.stringify(product)})' class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">编辑</button>
                            <button onclick="deleteProduct(${product.id})" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('加载产品出错:', err);
            }
        }

        // 删除产品
        async function deleteProduct(id) {
            if (!confirm('确定要删除这个产品吗？')) return;
            
            try {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    console.error('删除产品失败:', error);
                    alert('删除失败，请重试');
                    return;
                }
                
                loadAdminProducts();
            } catch (err) {
                console.error('删除产品出错:', err);
            }
        }

        function previewEditImage(event) {
            const file = event.target.files[0];
            if (file) {
                editCurrentFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('editPreview').src = e.target.result;
                    document.getElementById('editImagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function editProduct(product) {
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductDesc').value = product.description;
            
            if (!editQuillEditor) {
                editQuillEditor = new Quill('#editDetailEditor', {
                    theme: 'snow',
                    placeholder: '输入产品详情...',
                    modules: {
                        toolbar: [
                            [{ 'header': [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ 'color': [] }, { 'background': [] }],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'align': [] }],
                            ['link', 'image'],
                            ['clean']
                        ]
                    }
                });
            }
            
            editQuillEditor.root.innerHTML = product.detail || '';
            
            document.getElementById('editImagePreview').classList.add('hidden');
            editCurrentFile = null;
            
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        async function saveEditProduct() {
            const id = parseInt(document.getElementById('editProductId').value);
            const name = document.getElementById('editProductName').value.trim();
            const description = document.getElementById('editProductDesc').value.trim();
            const detail = editQuillEditor.root.innerHTML;
            
            if (!name || !description) {
                alert('请填写完整信息！');
                return;
            }

            try {
                let imageUrl = null;
                
                if (editCurrentFile) {
                    imageUrl = await uploadImage(editCurrentFile);
                    if (!imageUrl) {
                        alert('图片上传失败，请重试');
                        return;
                    }
                }

                const updateData = {
                    name: name,
                    description: description,
                    detail: detail
                };
                
                if (imageUrl) {
                    updateData.image_url = imageUrl;
                }

                const { error } = await supabaseClient
                    .from('products')
                    .update(updateData)
                    .eq('id', id);
                
                if (error) {
                    console.error('更新产品失败:', error);
                    alert('更新产品失败，请重试');
                    return;
                }

                closeEditModal();
                loadAdminProducts();
                alert('产品更新成功！');
            } catch (err) {
                console.error('更新产品出错:', err);
                alert('更新产品出错，请重试');
            }
        }

        // 页面加载时检查登录状态
        checkLogin();
    </script>
</body>
</html>
