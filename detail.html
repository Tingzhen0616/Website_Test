<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://tdtrpsmqzegmrywbcorh.supabase.co">
    <link rel="dns-prefetch" href="https://tdtrpsmqzegmrywbcorh.supabase.co">
    <title>作品详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 富文本内容样式 */
        .prose {
            color: #374151;
            line-height: 1.75;
        }
        .prose h1, .prose h2, .prose h3 {
            color: #111827;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .prose h1 { font-size: 2.25rem; }
        .prose h2 { font-size: 1.875rem; }
        .prose h3 { font-size: 1.5rem; }
        .prose p {
            margin-top: 1rem;
            margin-bottom: 1rem;
            /* 保留文本中的空格，包括段前空格 */
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .prose img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .prose ul, .prose ol {
            margin-top: 1rem;
            margin-bottom: 1rem;
            padding-left: 2rem;
        }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose li {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose a {
            color: #3b82f6;
            text-decoration: underline;
        }
        .prose blockquote {
            border-left: 4px solid #e5e7eb;
            padding-left: 1rem;
            font-style: italic;
            color: #6b7280;
        }
        /* Quill对齐样式 */
        .ql-align-left { text-align: left; }
        .ql-align-center { text-align: center; }
        .ql-align-right { text-align: right; }
        .ql-align-justify { text-align: justify; }
        /* 图片对齐样式 */
        .prose img.img-align-left {
            float: left;
            margin-right: 1.5rem;
            margin-bottom: 1rem;
        }
        .prose img.img-align-center {
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .prose img.img-align-right {
            float: right;
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }
        /* 清除浮动 */
        .prose::after {
            content: "";
            display: table;
            clear: both;
        }
        /* Quill 字体大小样式 */
        .prose .ql-size-10px { font-size: 10px; }
        .prose .ql-size-12px { font-size: 12px; }
        .prose .ql-size-14px { font-size: 14px; }
        .prose .ql-size-16px { font-size: 16px; }
        .prose .ql-size-18px { font-size: 18px; }
        .prose .ql-size-20px { font-size: 20px; }
        .prose .ql-size-24px { font-size: 24px; }
        .prose .ql-size-28px { font-size: 28px; }
        .prose .ql-size-32px { font-size: 32px; }
        .prose .ql-size-36px { font-size: 36px; }
        .prose .ql-size-48px { font-size: 48px; }
        .prose .ql-size-60px { font-size: 60px; }
        .prose .ql-size-72px { font-size: 72px; }
        /* Quill 字体样式 */
        .prose .ql-font-sans-serif { font-family: sans-serif; }
        .prose .ql-font-serif { font-family: serif; }
        .prose .ql-font-monospace { font-family: monospace; }
        .prose .ql-font-Microsoft-YaHei { font-family: 'Microsoft YaHei', sans-serif; }
        .prose .ql-font-SimSun { font-family: 'SimSun', serif; }
        .prose .ql-font-KaiTi { font-family: 'KaiTi', serif; }
        .prose .ql-font-FangSong { font-family: 'FangSong', serif; }
        .prose .ql-font-Heiti-SC { font-family: 'Heiti SC', sans-serif; }
        .prose .ql-font-STXingkai { font-family: 'STXingkai', cursive; }
        .prose .ql-font-STLiti { font-family: 'STLiti', cursive; }
        .prose .ql-font-YouYuan { font-family: 'YouYuan', sans-serif; }
        .prose .ql-font-Arial { font-family: 'Arial', sans-serif; }
        .prose .ql-font-Georgia { font-family: 'Georgia', serif; }
        .prose .ql-font-Times-New-Roman { font-family: 'Times New Roman', serif; }
        .prose .ql-font-Courier-New { font-family: 'Courier New', monospace; }
        .prose .ql-font-Verdana { font-family: 'Verdana', sans-serif; }
        /* 加载动画 */
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 详情页图片容器 */
        .detail-image-container {
            position: relative;
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .detail-image-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 200px;
        }
        .detail-image-loading-spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        .detail-image-loading-text {
            margin-top: 12px;
            color: #6b7280;
            font-size: 14px;
        }
        /* 富文本图片容器 */
        .prose-image-container {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .prose-image-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border-radius: 0.5rem;
            min-height: 150px;
        }

    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-gray-800 hover:text-blue-600 transition">← 作品展示</a>
            <a href="admin.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                管理员入口
            </a>
        </div>
    </nav>

    <!-- 作品详情 -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="loadingState" class="text-center py-16">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-500 text-lg">加载中...</p>
        </div>
        
        <div id="errorState" class="text-center py-16 hidden">
            <p class="text-red-500 text-lg">加载失败，请重试</p>
            <div class="mt-4 space-x-4">
                <button onclick="loadProductDetail()" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 transition">
                    重新加载
                </button>
                <a href="index.html" class="inline-block text-blue-500 hover:underline">返回首页</a>
            </div>
        </div>
        
        <div id="notFoundState" class="text-center py-16 hidden">
            <p class="text-gray-500 text-lg">作品不存在</p>
            <a href="index.html" class="inline-block mt-4 text-blue-500 hover:underline">返回首页</a>
        </div>
        
        <div id="productDetail" class="hidden">
            <div id="detailImageContainer" class="bg-white rounded-lg p-6 mb-6 hidden">
                <div class="detail-image-container">
                    <div class="detail-image-loading" id="detailImageLoading">
                        <div class="detail-image-loading-spinner"></div>
                        <div class="detail-image-loading-text">加载中...</div>
                    </div>
                    <img id="detailImage" class="w-full max-h-[500px] object-contain relative z-10" alt="" 
                        onload="document.getElementById('detailImageLoading').style.display='none'"
                        onerror="document.getElementById('detailImageLoading').innerHTML='<div class=\\'flex items-center justify-center h-full text-gray-500\\'>图片加载失败</div>';">
                </div>
            </div>
            <h1 id="detailTitle" class="text-3xl font-bold text-gray-800 mb-6"></h1>
            <div id="detailContent" class="prose max-w-none bg-white rounded-lg p-6"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://tdtrpsmqzegmrywbcorh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdHJwc21xemVnbXJ5d2Jjb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgzNTIsImV4cCI6MjA5MjI2NDM1Mn0._Yr7Uw6vhRgj7hI5deUJ5WLmcd_odgEm-Q1aiwWCk3g';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            fetch: (url, options = {}) => {
                const defaultOptions = {
                    cache: 'no-store',
                };
                return fetch(url, { ...defaultOptions, ...options });
            }
        });



        // 页面加载时间
        let pageLoadTime = Date.now();

        // 添加缓存破坏参数的函数 - 使用固定时间戳
        function addCacheBuster(url) {
            if (!url) return url;
            const separator = url.includes('?') ? '&' : '?';
            return url + separator + '_t=' + pageLoadTime;
        }

        // 处理富文本内容中的图片缓存问题
        function processDetailContent(html) {
            if (!html) return html;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const images = tempDiv.querySelectorAll('img');
            let imgCounter = 0;
            images.forEach(img => {
                if (img.src) {
                    imgCounter++;
                    const loadingId = `prose-loading-${imgCounter}`;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'prose-image-container';
                    
                    const loadingDiv = document.createElement('div');
                    loadingDiv.className = 'prose-image-loading';
                    loadingDiv.id = loadingId;
                    loadingDiv.innerHTML = `
                        <div class="detail-image-loading-spinner"></div>
                        <div class="detail-image-loading-text">加载中...</div>
                    `;
                    
                    img.classList.add('relative', 'z-10');
                    img.src = addCacheBuster(img.src);
                    img.setAttribute('onload', `document.getElementById('${loadingId}').style.display='none'`);
                    img.onerror = function() {
                        this.onerror = null;
                        const loadingEl = document.getElementById(loadingId);
                        if (loadingEl) {
                            loadingEl.innerHTML = '<div class="flex items-center justify-center h-full text-gray-500">图片加载失败</div>';
                        }
                    };
                    
                    img.parentNode.insertBefore(wrapper, img);
                    wrapper.appendChild(loadingDiv);
                    wrapper.appendChild(img);
                }
            });
            return tempDiv.innerHTML;
        }

        function getProductId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function loadProductDetail() {
            const productId = getProductId();
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const notFoundState = document.getElementById('notFoundState');
            const productDetail = document.getElementById('productDetail');
            
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            notFoundState.classList.add('hidden');
            productDetail.classList.add('hidden');
            
            if (!productId) {
                loadingState.classList.add('hidden');
                notFoundState.classList.remove('hidden');
                return;
            }
            
            try {
                const { data: product, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .eq('id', productId)
                    .single();
                
                loadingState.classList.add('hidden');
                
                if (error || !product) {
                    notFoundState.classList.remove('hidden');
                    return;
                }
                
                document.getElementById('detailTitle').textContent = product.name;
                
                if (product.image_url) {
                    const detailImage = document.getElementById('detailImage');
                    detailImage.src = addCacheBuster(product.image_url);
                    detailImage.alt = product.name;
                    detailImage.onload = () => {
                        detailImage.classList.add('loaded');
                    };
                    document.getElementById('detailImageContainer').classList.remove('hidden');
                } else {
                    document.getElementById('detailImageContainer').classList.add('hidden');
                }
                
                document.getElementById('detailContent').innerHTML = processDetailContent(product.detail) || '<p class="text-gray-400">暂无详情</p>';
                
                document.title = product.name + ' - 作品展示';
                productDetail.classList.remove('hidden');
                

            } catch (err) {
                console.error('加载产品详情出错:', err);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        }

        loadProductDetail();
    </script>
</body>
</html>
