<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">作品展示</h1>
            <a href="admin.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                管理员入口
            </a>
        </div>
    </nav>

    <!-- 作品列表 -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 作品将在这里动态显示 -->
        </div>
        
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-gray-500 text-lg">暂无作品，请先登录管理员账号添加作品</p>
        </div>
    </main>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://tdtrpsmqzegmrywbcorh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdHJwc21xemVnbXJ5d2Jjb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgzNTIsImV4cCI6MjA5MjI2NDM1Mn0._Yr7Uw6vhRgj7hI5deUJ5WLmcd_odgEm-Q1aiwWCk3g';
        
        // 初始化 Supabase 客户端
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 从 Supabase 加载作品
        async function loadProducts() {
            const productList = document.getElementById('productList');
            const emptyState = document.getElementById('emptyState');
            
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('display_order', { ascending: true });
                
                if (error) {
                    console.error('加载作品失败:', error);
                    return;
                }
                
                if (!products || products.length === 0) {
                    productList.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                productList.innerHTML = products.map((product) => `
                    <a href="detail.html?id=${product.id}" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition block">
                        ${product.image_url 
                            ? `<img src="${product.image_url}" alt="${product.name}" class="w-full h-64 object-cover">`
                            : '<div class="w-full h-64 bg-gray-200 flex items-center justify-center text-gray-400">无图片</div>'
                        }
                        <div class="p-6">
                            <h3 class="text-2xl font-semibold text-gray-800">${product.name}</h3>
                        </div>
                    </a>
                `).join('');
            } catch (err) {
                console.error('加载作品出错:', err);
            }
        }

        // 页面加载时显示作品
        loadProducts();
        
        // 每 5 秒刷新一次，实现实时同步
        setInterval(loadProducts, 5000);
    </script>
</body>
</html>
