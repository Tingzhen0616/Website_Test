<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">产品展示</h1>
            <a href="admin.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                管理员入口
            </a>
        </div>
    </nav>

    <!-- 产品列表 -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 产品将在这里动态显示 -->
        </div>
        
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-gray-500 text-lg">暂无产品，请先登录管理员账号添加产品</p>
        </div>
    </main>

    <script>
        // 从 LocalStorage 加载产品
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const productList = document.getElementById('productList');
            const emptyState = document.getElementById('emptyState');
            
            if (products.length === 0) {
                productList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            productList.innerHTML = products.map(product => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
                    <img src="${product.image}" alt="${product.name}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-semibold text-gray-800 mb-3">${product.name}</h3>
                        <p class="text-gray-600 text-lg">${product.description}</p>
                    </div>
                </div>
            `).join('');
        }

        // 页面加载时显示产品
        loadProducts();
        
        // 监听 storage 变化，实现多页面同步
        window.addEventListener('storage', loadProducts);
    </script>
</body>
</html>
