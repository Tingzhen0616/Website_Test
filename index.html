<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">作品展示</h1>
            <a href="admin.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                管理员入口
            </a>
        </div>
    </nav>

    <!-- 产品列表 -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 产品将在这里动态显示 -->
        </div>
        
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-gray-500 text-lg">暂无产品，请先登录管理员账号添加产品</p>
        </div>
    </main>

    <!-- 产品详情模态框 -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800"></h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6">
                <img id="modalImage" class="w-full h-96 object-cover rounded-lg mb-6" alt="">
                <p id="modalDescription" class="text-gray-600 text-lg mb-6"></p>
                <div id="modalDetail" class="prose max-w-none"></div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://tdtrpsmqzegmrywbcorh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdHJwc21xemVnbXJ5d2Jjb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgzNTIsImV4cCI6MjA5MjI2NDM1Mn0._Yr7Uw6vhRgj7hI5deUJ5WLmcd_odgEm-Q1aiwWCk3g';
        
        // 初始化 Supabase 客户端
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 从 Supabase 加载产品
        async function loadProducts() {
            const productList = document.getElementById('productList');
            const emptyState = document.getElementById('emptyState');
            
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('加载产品失败:', error);
                    return;
                }
                
                if (!products || products.length === 0) {
                    productList.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                productList.innerHTML = products.map((product, index) => `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition cursor-pointer" data-index="${index}">
                        <img src="${product.image_url}" alt="${product.name}" class="w-full h-64 object-cover">
                        <div class="p-6">
                            <h3 class="text-2xl font-semibold text-gray-800 mb-3">${product.name}</h3>
                            <p class="text-gray-600 text-lg">${product.description}</p>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('#productList > div').forEach((card, index) => {
                    card.addEventListener('click', () => openModal(products[index]));
                });
            } catch (err) {
                console.error('加载产品出错:', err);
            }
        }

        // 页面加载时显示产品
        loadProducts();
        
        // 每 5 秒刷新一次，实现实时同步
        setInterval(loadProducts, 5000);

        function openModal(product) {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').textContent = product.name;
            document.getElementById('modalImage').src = product.image_url;
            document.getElementById('modalImage').alt = product.name;
            document.getElementById('modalDescription').textContent = product.description;
            document.getElementById('modalDetail').innerHTML = product.detail || '&lt;p class="text-gray-400"&gt;暂无详情&lt;/p&gt;';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    &lt;/script&gt;</script>
</body>
</html>
