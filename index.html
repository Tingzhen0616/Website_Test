<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://tdtrpsmqzegmrywbcorh.supabase.co">
    <link rel="dns-prefetch" href="https://tdtrpsmqzegmrywbcorh.supabase.co">
    <title>作品展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .product-image-container {
            position: relative;
            width: 100%;
            height: 256px;
            background-color: #e5e7eb;
            overflow: hidden;
        }
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .image-loading-spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        .image-loading-text {
            margin-top: 8px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">作品展示</h1>
            <div class="flex items-center space-x-4">
                <div id="refreshIndicator" class="flex items-center text-gray-400 text-sm hidden">
                    <div class="loading-spinner w-4 h-4 mr-2"></div>
                    刷新中...
                </div>
                <a href="admin.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                    管理员入口
                </a>
            </div>
        </div>
    </nav>

    <!-- 作品列表 -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- 加载状态 -->
        <div id="loadingState" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="w-full h-64 skeleton"></div>
                <div class="p-6">
                    <div class="h-8 w-3/4 skeleton rounded"></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="w-full h-64 skeleton"></div>
                <div class="p-6">
                    <div class="h-8 w-3/4 skeleton rounded"></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="w-full h-64 skeleton"></div>
                <div class="p-6">
                    <div class="h-8 w-3/4 skeleton rounded"></div>
                </div>
            </div>
        </div>
        
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- 作品将在这里动态显示 -->
        </div>
        
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-gray-500 text-lg">暂无作品，请先登录管理员账号添加作品</p>
        </div>
        
        <!-- 错误状态 -->
        <div id="errorState" class="text-center py-16 hidden">
            <p class="text-red-500 text-lg">加载失败，请刷新页面重试</p>
            <button onclick="loadProducts()" class="mt-4 bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 transition">
                重新加载
            </button>
        </div>
    </main>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://tdtrpsmqzegmrywbcorh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdHJwc21xemVnbXJ5d2Jjb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgzNTIsImV4cCI6MjA5MjI2NDM1Mn0._Yr7Uw6vhRgj7hI5deUJ5WLmcd_odgEm-Q1aiwWCk3g';
        
        // 初始化 Supabase 客户端
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            fetch: (url, options = {}) => {
                const defaultOptions = {
                    cache: 'no-store',
                };
                return fetch(url, { ...defaultOptions, ...options });
            }
        });

        // 存储当前产品数据
        let currentProducts = null;
        let pageLoadTime = Date.now();
        const CACHE_KEY = 'products_cache';
        const CACHE_EXPIRY = 5 * 60 * 1000; // 5分钟
        const SCROLL_KEY = 'products_scroll_pos';

        // 添加缓存破坏参数的函数 - 只在初次加载时添加时间戳
        function addCacheBuster(url) {
            if (!url) return url;
            const separator = url.includes('?') ? '&' : '?';
            return url + separator + '_t=' + pageLoadTime;
        }

        // 渲染产品列表
        function renderProducts(products) {
            const productList = document.getElementById('productList');
            const emptyState = document.getElementById('emptyState');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            
            if (!products || products.length === 0) {
                productList.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            productList.classList.remove('hidden');
            
            productList.innerHTML = products.map((product) => {
                const imageUrl = product.image_url ? addCacheBuster(product.image_url) : null;
                return `
                    <a href="detail.html?id=${product.id}" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition block">
                        <div class="product-image-container">
                            ${imageUrl 
                                ? `
                                    <div class="image-loading-overlay" id="loading-${product.id}">
                                        <div class="image-loading-spinner"></div>
                                        <div class="image-loading-text">加载中...</div>
                                    </div>
                                    <img 
                                        src="${imageUrl}" 
                                        alt="${product.name}" 
                                        class="product-image"
                                        onload="document.getElementById('loading-${product.id}').style.display='none'"
                                        onerror="document.getElementById('loading-${product.id}').innerHTML='<div class=\\'flex items-center justify-center h-full text-gray-500\\'>图片加载失败</div>';"
                                    >
                                `
                                : '<div class="flex items-center justify-center h-full text-gray-500">无图片</div>'
                            }
                        </div>
                        <div class="p-6">
                            <h3 class="text-2xl font-semibold text-gray-800">${product.name}</h3>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // 检查产品数据是否有变化
        function hasProductsChanged(newProducts) {
            if (!currentProducts || currentProducts.length !== newProducts.length) {
                return true;
            }
            for (let i = 0; i < newProducts.length; i++) {
                const oldP = currentProducts[i];
                const newP = newProducts[i];
                if (oldP.id !== newP.id || 
                    oldP.name !== newP.name || 
                    oldP.image_url !== newP.image_url ||
                    oldP.display_order !== newP.display_order ||
                    oldP.updated_at !== newP.updated_at) {
                    return true;
                }
            }
            return false;
        }

        // 保存缓存
        function saveCache(data) {
            const cacheData = {
                data: data,
                timestamp: Date.now()
            };
            localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
        }

        // 读取缓存
        function getCache() {
            const cacheStr = localStorage.getItem(CACHE_KEY);
            if (!cacheStr) return null;
            
            try {
                const cacheData = JSON.parse(cacheStr);
                if (Date.now() - cacheData.timestamp < CACHE_EXPIRY) {
                    return cacheData.data;
                }
            } catch (e) {
                console.error('解析缓存失败:', e);
            }
            return null;
        }

        // 保存滚动位置
        function saveScrollPosition() {
            sessionStorage.setItem(SCROLL_KEY, window.scrollY.toString());
        }

        // 恢复滚动位置
        function restoreScrollPosition() {
            const savedScroll = sessionStorage.getItem(SCROLL_KEY);
            if (savedScroll) {
                window.scrollTo(0, parseInt(savedScroll, 10));
            }
        }

        // 监听页面离开事件保存滚动位置
        window.addEventListener('beforeunload', saveScrollPosition);

        // 从 Supabase 加载作品
        async function loadProducts(isRefresh = false) {
            const refreshIndicator = document.getElementById('refreshIndicator');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            
            if (!isRefresh) {
                // 初次加载：先尝试用缓存
                const cachedData = getCache();
                if (cachedData && cachedData.length > 0) {
                    currentProducts = cachedData;
                    renderProducts(cachedData);
                    // 恢复滚动位置
                    restoreScrollPosition();
                    // 继续后台获取最新数据
                    fetchAndUpdateProducts(false);
                    return;
                }
                
                // 没有缓存，显示加载状态
                loadingState.classList.remove('hidden');
                document.getElementById('productList').classList.add('hidden');
                document.getElementById('emptyState').classList.add('hidden');
                errorState.classList.add('hidden');
            } else {
                refreshIndicator.classList.remove('hidden');
            }
            
            await fetchAndUpdateProducts(isRefresh);
        }

        // 获取并更新产品数据
        async function fetchAndUpdateProducts(isRefresh = false) {
            const refreshIndicator = document.getElementById('refreshIndicator');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('display_order', { ascending: true });
                
                if (error) {
                    console.error('加载作品失败:', error);
                    if (!isRefresh) {
                        loadingState.classList.add('hidden');
                        errorState.classList.remove('hidden');
                    }
                    refreshIndicator.classList.add('hidden');
                    return;
                }
                
                if (!products || products.length === 0) {
                    if (!isRefresh) {
                        loadingState.classList.add('hidden');
                        document.getElementById('productList').classList.add('hidden');
                        document.getElementById('emptyState').classList.remove('hidden');
                    }
                    refreshIndicator.classList.add('hidden');
                    currentProducts = [];
                    saveCache(products);
                    return;
                }
                
                // 如果是刷新且数据没有变化，直接返回
                if (isRefresh && !hasProductsChanged(products)) {
                    refreshIndicator.classList.add('hidden');
                    return;
                }
                
                currentProducts = products;
                saveCache(products);
                
                if (!isRefresh) {
                    renderProducts(products);
                } else {
                    // 只在数据变化时才重新渲染
                    renderProducts(products);
                    refreshIndicator.classList.add('hidden');
                }
            } catch (err) {
                console.error('加载作品出错:', err);
                if (!isRefresh) {
                    loadingState.classList.add('hidden');
                    errorState.classList.remove('hidden');
                }
                refreshIndicator.classList.add('hidden');
            }
        }

        // 页面加载时显示作品
        loadProducts();
        
        // 每 5 秒刷新一次，实现实时同步
        setInterval(() => fetchAndUpdateProducts(true), 5000);
    </script>
</body>
</html>
